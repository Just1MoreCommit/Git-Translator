<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitly</title>
    <link href="https://fonts.google.com/share?selection.family=JetBrains+Mono:ital,wght@0,100..800;1,100..800" rel="stylesheet">
</head>
<body class="h-screen w-screen bg-gray-900 text-white">

    <div id="header" class="flex flex-row items-center justify-between px-6 py-4 bg-black border-b border-gray-700">

        <div id="head-left" class="text-xl font-bold tracking-wide border-r border-gray-700 px-6 py-3">
            <p>Gitly</p>
        </div>

        <div id="head-mid" class="text-sm font-mono text-green-400 uppercase tracking-widest">
            <p>SYS_ACTIV</p>
        </div>

        <div id="head-right">
            <img src="https://avatars.githubusercontent.com/u/235946347?v=4" width="50" height="50">
           <!-- Right side content goes here -->
        </div>

    </div>


    <div id="body" class="flex flex-row h-full">

        <div id="left-col" class="w-64 bg-gray-800 border-r border-gray-700 p-4">


        </div>

        <div id="mid-col" class="flex-1 bg-black p-4">
            <div class="bg-white p-4 text-black min-h-96"> 
                <p class="text-3xl font-mono my-6">REPOSITORY_DECODER</p>
                <p class="text-3xl font-mono my-6">SETTING URL ENDPOINT</p>
                <div class="bg-white border-3 border-black p-4 min-h-26 flex items-center justify-center">
                    <input type="text" placeholder="https://github.com/username/repo" class="w-full px-4 py-3 text-4xl font-mono placeholder-gray-600 focus:outline-none focus:border-green-500">
                </div>

                <div id="slider" class="flex flex-col gap-1 justify-center">

                    <input
                     type="range"
                     min="0"
                     max="100"
                     value="40"
                     class="w-full accent-purple-500 cursor-pointer h-1 p-6"
                    >

                     <div class="flex justify-between text-xs font-mono text-gray-500">
                         <span>COMMIT_RANGE_START: 0x4f2a</span>
                         <span>COMMIT_RANGE_END: 9EA0</span>
                      </div>

                </div>

            </div>

        </div>


        <div id="right-col" class="w-64 bg-gray-800 border-l border-gray-700 p-4">


            
        </div>


    </div>

    <script src="dist/bundle.js"></script>
</body>
</html>
